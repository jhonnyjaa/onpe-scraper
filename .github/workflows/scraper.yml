name: ONPE Electoral Scraper

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run scraper
        run: python scraper.py

      - name: Commit results
        run: |
          git config user.name "onpe-scraper-bot"
          git config user.email "bot@scraper.local"
          git add data/
          git diff --staged --quiet || git commit -m "snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push